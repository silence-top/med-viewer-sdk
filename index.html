<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MedViewer SDK Lab</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: rgba(24, 28, 36, 0.82);
        --panel-border: rgba(255, 255, 255, 0.08);
        --accent: #31d0aa;
        --text: #f2f5f8;
        --muted: #a8b2c1;
        --glow: 0 10px 30px rgba(14, 255, 198, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 10% 0%, #1c2433 0%, transparent 60%),
          radial-gradient(900px 400px at 90% 20%, #1a2a2f 0%, transparent 55%),
          var(--bg);
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      .page {
        display: grid;
        grid-template-rows: 1fr;
        height: 100vh;
      }

      #app-container {
        position: relative;
        margin: 5px;
        border-radius: 5px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      .hint {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        #app-container {
          margin: 0 12px 16px;
        }

        .med-toolbar {
          flex-wrap: wrap;
          max-width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div id="app-container"></div>
    </div>

    <script type="module">
      import { MedViewerEngine } from "./src/index.ts";
      const viewData = {
        CameraPixel: "TP_3.45",
        Id: "68cd05e300642632ccdb47e8",
        overViewSizeWidth: 88064,
        overViewSizeHeight: 89088,
        LevelCount: 8,
        ActualRatio: 1,
        BlockCoreSizeWidth: 1024,
        BlockCoreSizeHeight: 1024,
      };
      const baseUrl =
        "http://192.168.3.24:5000/diagnosis/getLevelImage?BlocksName=Blocks";
      let CameraPixel = viewData.CameraPixel ? viewData.CameraPixel : "PL_5.86";
      let CameraPixelNum = parseFloat(CameraPixel.replace(/[^\d.]/g, ""));
      let ActualRatio = viewData.ActualRatio
        ? parseFloat(viewData.ActualRatio)
        : 1;
      let pixelsPerMeter = (1e6 / CameraPixelNum) * 20 * ActualRatio;

      const tileSources = {
        height: viewData.overViewSizeHeight,
        width: viewData.overViewSizeWidth,
        tileSize: viewData.BlockCoreSizeWidth,
        minLevel: 1,
        maxLevel: viewData.LevelCount,
        getTileUrl: function (level, x, y) {
          if (level >= viewData.LevelCount + 1) console.log(level, x, y);
          if (viewData.LevelCount - level >= 0) {
            return `${baseUrl}&id=${viewData.Id}&level=${
              viewData.LevelCount - level
            }&row=${x}&column=${y}`;
          } else {
            return null;
          }
        },
      };

      const toolbarConfig = {
        position: "BOTTOM_CENTER",
        defaultActiveId: "browse",
        buttons: [
          {
            id: "reset",
            label: "重置",
          },
          {
            id: "anno",
            label: "标注设置",
          },
          {
            id: "colorAdjust",
            label: "颜色调整",
          },
          {
            id: "selection",
            label: "截图设置",
          },
        ],
      };

      // 1. 初始化引擎，同时开启两个插件
      const engine = new MedViewerEngine({
        id: "app-container",
        locale: "en-US",  
        tileSources: tileSources,
        plugins: {
          annotorious: {
            enabled: true,
            options: {
              autoSave: true,
              // adapter: W3CImageFormat('https://iiif.bodleian.ox.ac.uk/iiif/image/af315e66-6a85-445b-9e26-012f729fc49c'),
              drawingEnabled: false,

              // 这里可以传入 Annotorious 的配置选项
            },
          },
          toolbar: toolbarConfig,
          magnification: {
            type: "LD",
            position: "BOTTOM_LEFT",
            offsetX: 10,
            offsetY: -50,
          },
          selection: {
            showSelectionControl: true,
            showConfirmDenyButtons: true,
            keyboardShortcut: "s",
            onSelection: function (rect) {
              console.log("Selection made:", rect);
            },
            onSelectionChange: function (rect) {
              console.log("Selection changed:", rect);
            },
            onSelectionCanceled: function () {
              engine.selection?.disable();
              console.log("Selection canceled");
            },
            onSelectionToggled: function (state) {
              console.log("Selection toggled:", state);
            },
          },
          colorAdjust: {
            adjustments: {
              brightness: 1.0,
              contrast: 1.0,
              saturation: 1.0,
              gamma: 1.0,
              hue: 0,
              invert: false,
              sepia: false,
              greyscale: false,
            },
            debounceMs: 30, // 防抖延迟
            loadMode: "async", // 渲染模式
          },
          scalebar: {
            type: "NONE",
            pixelsPerMeter: pixelsPerMeter,
            xOffset: 10,
            yOffset: 10,
            stayInsideImage: true,
            color: "rgb(0, 0, 0)",
            fontColor: "rgb(0, 0, 0)",
            fontSize: "14px",
            fontFamily: "sans-serif",
            barThickness: 1.5,
            minWidth: "75px",
            location: "NONE",
            referenceItemIdx: 0,
          },
        },
      });

      // 2. 暴露给 window 方便调试
      window.engine = engine;
      console.log("MedViewerEngine initialized:", engine);

      // 3. 定义切换逻辑
      window.useBrowse = () => {
        engine.toolbar?.setActive("browse");
        console.log("切换到浏览模式");
      };

      window.useAnno = () => {
        engine.toolbar?.setActive("anno");
      };
    </script>
  </body>
</html>
