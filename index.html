<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MedViewer SDK Lab</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: rgba(24, 28, 36, 0.82);
        --panel-border: rgba(255, 255, 255, 0.08);
        --accent: #31d0aa;
        --text: #f2f5f8;
        --muted: #a8b2c1;
        --glow: 0 10px 30px rgba(14, 255, 198, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 10% 0%, #1c2433 0%, transparent 60%),
          radial-gradient(900px 400px at 90% 20%, #1a2a2f 0%, transparent 55%), var(--bg);
        font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      .page {
        display: grid;
        grid-template-rows: 1fr;
        height: 100vh;
      }

      #app-container {
        position: relative;
        margin: 5px;
        border-radius: 5px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      .hint {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        #app-container {
          margin: 0 12px 16px;
        }

        .med-toolbar {
          flex-wrap: wrap;
          max-width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div id="app-container"></div>
    </div>

    <script type="module">
      import {
        MedViewerEngine,
        MagnificationPosition,
        MagnificationType,
        ScalebarType,
        ScalebarLocation,
        ToolbarPosition
      } from './src/index.ts'
      import ai_json from './1.json'
      console.log(ai_json)

      const ai_list = []
      ai_json.forEach((item) => {
        ai_list.push({
          x: parseFloat(item.PositionInOverViewX) - 256,
          y: parseFloat(item.PositionInOverViewY) - 256,
          width: 512,
          height: 512,
          style: { border: '3px solid #f5222d', fontSize: 14 },
          labels: [
            {
              label: 'Class',
              value: `w:${parseFloat(item.PositionInOverViewX) - 256}, h:${parseFloat(item.PositionInOverViewY) - 256}`,
              style: { color: '#f5222d' }
            },
            {
              label: 'Name',
              value: item.ImageName,
              style: { color: '#f5222d' }
            }
          ]
        })
      })

      // const ai_json = require('./1.json')
      const viewData = {
        CameraPixel: 'TP_3.45',
        Id: '69a92eae6b948d36f8af170e',
        overViewSizeWidth: 53248,
        overViewSizeHeight: 54272,
        LevelCount: 7,
        ActualRatio: 1,
        BlockCoreSizeWidth: 1024,
        BlockCoreSizeHeight: 1024
      }
      const baseUrl =
        'https://ld-ark-service-ld-ark-qmddmnxxlt.cn-shenzhen.fcapp.run/ark/wsi_level_image?wsi_id=0cc8566a-064d-11f1-a1fd-009027f9d4d6&storage_type=oss&storage_key=ark/demo_data/cervical_cytology/0cc8566a-064d-11f1-a1fd-009027f9d4d6&BlocksName=Blocks'
      let CameraPixel = viewData.CameraPixel ? viewData.CameraPixel : 'PL_5.86'
      let CameraPixelNum = parseFloat(CameraPixel.replace(/[^\d.]/g, ''))
      let ActualRatio = viewData.ActualRatio ? parseFloat(viewData.ActualRatio) : 1
      let pixelsPerMeter = (1e6 / CameraPixelNum) * 20 * ActualRatio

      const tileSources = {
        height: viewData.overViewSizeHeight,
        width: viewData.overViewSizeWidth,
        tileSize: viewData.BlockCoreSizeWidth,
        minLevel: 1,
        maxLevel: viewData.LevelCount,
        getTileUrl: function (level, x, y) {
          if (level >= viewData.LevelCount + 1) console.log(level, x, y)
          if (viewData.LevelCount - level >= 0) {
            return `${baseUrl}&id=${viewData.Id}&level=${
              viewData.LevelCount - level
            }&row=${x}&column=${y}`
          } else {
            return null
          }
        }
      }

      const toolbarConfig = {
        position: ToolbarPosition.BOTTOM_CENTER,
        buttons: [
          {
            id: 'reset',
            label: '重置'
          },
          {
            id: 'anno',
            label: '标注'
          },
          {
            id: 'colorAdjust',
            label: '颜色调整'
          },
          {
            id: 'rotateAdjust',
            label: '角度调整'
          },

          {
            id: 'selection',
            label: '截图'
          }
        ]
      }

      // 1. 初始化引擎，同时开启两个插件
      const engine = new MedViewerEngine({
        locale: 'zh-CN',
        theme: 'dark',
        osdOptions: {
          id: 'app-container',
          tileSources: tileSources
        },

        plugins: {
          annotorious: {
            enabled: true,
            options: {
              autoSave: true,
              // adapter: W3CImageFormat('https://iiif.bodleian.ox.ac.uk/iiif/image/af315e66-6a85-445b-9e26-012f729fc49c'),
              drawingEnabled: false,
              formatter: {
                pixelsPerMeter: pixelsPerMeter,
                showMeasure: true
              },
              rememberDrawingTools: true

              // 这里可以传入 Annotorious 的配置选项
            },
            //被调用
            onCreateAnnotation: (annotation) => {
              console.log('标注已创建:', annotation)
              // 在这里，您可以将标注信息发送到服务器，或者更新您的应用状态
            },

            // 当一个标注被更新时，这个函数会被调用
            onUpdateAnnotation: (annotation, previous) => {
              console.log('标注已更新:', annotation)
            },

            // 当一个标注被删除时，这个函数会被调用
            onDeleteAnnotation: (annotation) => {
              console.log('标注已删除:', annotation)
            }
          },
          toolbar: toolbarConfig,
          magnification: {
            type: MagnificationType.LD,
            position: MagnificationPosition.BOTTOM_LEFT,
            offsetX: 10,
            offsetY: -50
          },
          selection: {
            showSelectionControl: true,
            showConfirmDenyButtons: true,
            keyboardShortcut: 's',
            onSelection: function (rect, blob) {
              console.log('Selection made:', rect, blob)

              // 处理截图后的逻辑blob下载
              if (blob) {
                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = 'screenshot.png'
                a.click()
                URL.revokeObjectURL(url)
              }
            },
            onSelectionChange: function (rect) {
              console.log('Selection changed:', rect)
            },
            onSelectionCanceled: function () {
              engine.selection?.disable()
              console.log('Selection canceled')
            },
            onSelectionToggled: function (state) {
              console.log('Selection toggled:', state)
            }
          },
          colorAdjust: {
            adjustments: {
              brightness: 1.0,
              contrast: 1.0,
              saturation: 1.0,
              gamma: 1.0,
              hue: 0,
              invert: false,
              sepia: false,
              greyscale: false
            },
            debounceMs: 30, // 防抖延迟
            loadMode: 'async', // 渲染模式
            onAdjustmentsChange: (adjustments) => {
              console.log('颜色参数已改变:', adjustments)
            }
          },
          scalebar: {
            type: ScalebarType.MICROSCOPY,
            pixelsPerMeter: pixelsPerMeter,
            xOffset: 10,
            yOffset: 10,
            stayInsideImage: true,
            color: 'rgb(0, 0, 0)',
            fontColor: 'rgb(0, 0, 0)',
            fontSize: '14px',
            fontFamily: 'sans-serif',
            barThickness: 1.5,
            minWidth: '75px',
            location: ScalebarLocation.NONE,
            referenceItemIdx: 0
          }
        }
      })

      // 2. 暴露给 window 方便调试
      window.engine = engine
      console.log('engine', engine)

      engine.addOnceHandler('ready', () => {
        engine.loadAIMarks(ai_list, true)
        console.log('getMagnification', engine.magnification?.getMagnification())
        engine.goToPosition(
          {
            x: 20000,
            y: 13000
          },
          true,
          20
        )

        // engine.magnification?.setMagnification(20).then(() => {
        //   console.log('setMagnification', engine.magnification?.getMagnification())
        // })
      })

      // setTimeout(() => {
      //   engine.destroy()
      // }, 1000)

      let showAIMarksLabel = false
      engine.viewer.addHandler('zoom', (e) => {
        const magnification = engine.magnification?.getMagnification()
        if (magnification <= 10) {
          if (showAIMarksLabel) {
            engine.loadAIMarks(ai_list, false)
          }
          showAIMarksLabel = false
        } else {
          if (!showAIMarksLabel) {
            engine.loadAIMarks(ai_list, true)
          }
          showAIMarksLabel = true
        }
        console.log('zoom', e, magnification)
      })

      // 3. 定义切换逻辑
      window.useBrowse = () => {
        engine.toolbar?.setActive('browse')
        console.log('切换到浏览模式')
      }

      window.useAnno = () => {
        engine.toolbar?.setActive('anno')
      }
    </script>
  </body>
</html>
