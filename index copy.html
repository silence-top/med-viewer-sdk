<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MedViewer SDK Lab</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: rgba(24, 28, 36, 0.82);
        --panel-border: rgba(255, 255, 255, 0.08);
        --accent: #31d0aa;
        --text: #f2f5f8;
        --muted: #a8b2c1;
        --glow: 0 10px 30px rgba(14, 255, 198, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 10% 0%, #1c2433 0%, transparent 60%),
          radial-gradient(900px 400px at 90% 20%, #1a2a2f 0%, transparent 55%), var(--bg);
        font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      .page {
        display: grid;
        grid-template-rows: 1fr;
        height: 100vh;
      }

      #app-container {
        position: relative;
        margin: 5px;
        border-radius: 5px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      .hint {
        margin-left: auto;
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        #app-container {
          margin: 0 12px 16px;
        }

        .med-toolbar {
          flex-wrap: wrap;
          max-width: calc(100% - 24px);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div id="app-container"></div>
    </div>

    <script type="module">
      import {
        MedViewerEngine,
        MagnificationPosition,
        MagnificationType,
        ScalebarType,
        ScalebarLocation,
        ToolbarPosition
      } from './src/index.ts'
      const viewData = {
        CameraPixel: 'TP_3.45',
        Id: '69a92eae6b948d36f8af170e',
        overViewSizeWidth: 128000,
        overViewSizeHeight: 126976,
        LevelCount: 8,
        ActualRatio: 1,
        BlockCoreSizeWidth: 1024,
        BlockCoreSizeHeight: 1024
      }
      const baseUrl = 'http://192.168.3.24:5000/diagnosis/getLevelImage?BlocksName=Blocks'
      let CameraPixel = viewData.CameraPixel ? viewData.CameraPixel : 'PL_5.86'
      let CameraPixelNum = parseFloat(CameraPixel.replace(/[^\d.]/g, ''))
      let ActualRatio = viewData.ActualRatio ? parseFloat(viewData.ActualRatio) : 1
      let pixelsPerMeter = (1e6 / CameraPixelNum) * 20 * ActualRatio

      const tileSources = {
        height: viewData.overViewSizeHeight,
        width: viewData.overViewSizeWidth,
        tileSize: viewData.BlockCoreSizeWidth,
        minLevel: 1,
        maxLevel: viewData.LevelCount,
        getTileUrl: function (level, x, y) {
          if (level >= viewData.LevelCount + 1) console.log(level, x, y)
          if (viewData.LevelCount - level >= 0) {
            return `${baseUrl}&id=${viewData.Id}&level=${
              viewData.LevelCount - level
            }&row=${x}&column=${y}`
          } else {
            return null
          }
        }
      }

      const toolbarConfig = {
        position: ToolbarPosition.BOTTOM_CENTER,
        buttons: [
          {
            id: 'reset',
            label: '重置'
          },
          {
            id: 'anno',
            label: '标注'
          },
          {
            id: 'colorAdjust',
            label: '颜色调整'
          },
          {
            id: 'selection',
            label: '截图'
          }
        ]
      }

      // 1. 初始化引擎，同时开启两个插件
      const engine = new MedViewerEngine({
        locale: 'en-US',
        osdOptions: {
          id: 'app-container',
          tileSources: tileSources
        },

        plugins: {
          annotorious: {
            enabled: true,
            options: {
              autoSave: true,
              // adapter: W3CImageFormat('https://iiif.bodleian.ox.ac.uk/iiif/image/af315e66-6a85-445b-9e26-012f729fc49c'),
              drawingEnabled: false,
              formatter: {
                pixelsPerMeter: pixelsPerMeter,
                showMeasure: true
              }

              // 这里可以传入 Annotorious 的配置选项
            }
          },
          toolbar: toolbarConfig,
          magnification: {
            type: MagnificationType.LD,
            position: MagnificationPosition.BOTTOM_LEFT,
            offsetX: 10,
            offsetY: -50
          },
          selection: {
            showSelectionControl: true,
            showConfirmDenyButtons: true,
            keyboardShortcut: 's',
            onSelection: function (rect) {
              console.log('Selection made:', rect)
            },
            onSelectionChange: function (rect) {
              console.log('Selection changed:', rect)
            },
            onSelectionCanceled: function () {
              engine.selection?.disable()
              console.log('Selection canceled')
            },
            onSelectionToggled: function (state) {
              console.log('Selection toggled:', state)
            }
          },
          colorAdjust: {
            adjustments: {
              brightness: 1.0,
              contrast: 1.0,
              saturation: 1.0,
              gamma: 1.0,
              hue: 0,
              invert: false,
              sepia: false,
              greyscale: false
            },
            debounceMs: 30, // 防抖延迟
            loadMode: 'async' // 渲染模式
          },
          scalebar: {
            type: ScalebarType.MICROSCOPY,
            pixelsPerMeter: pixelsPerMeter,
            xOffset: 10,
            yOffset: 10,
            stayInsideImage: true,
            color: 'rgb(0, 0, 0)',
            fontColor: 'rgb(0, 0, 0)',
            fontSize: '14px',
            fontFamily: 'sans-serif',
            barThickness: 1.5,
            minWidth: '75px',
            location: ScalebarLocation.NONE,
            referenceItemIdx: 0
          }
        }
      })

      // 2. 暴露给 window 方便调试
      window.engine = engine
      const aiBoxes = [
        {
          x: 38213.5 - 256,
          y: 27078.0 - 256,
          width: 512,
          height: 512,
          style: { border: '3px solid #f5222d', fontSize: 14 },
          labels: [{ label: 'Class', value: 'ASCUS', style: { color: '#f5222d' } }]
        },
        {
          x: 73434.5 - 256,
          y: 95156.0 - 256,
          width: 512,
          height: 512,
          style: { border: '3px solid #f5222d', fontSize: 14 },
          labels: [{ label: 'Class', value: 'LSIL', style: { color: '#f5222d' } }]
        },
        {
          x: 42586.5 - 256,
          y: 34418.0 - 256,
          width: 512,
          height: 512,
          style: { border: '3px solid #f5222d', fontSize: 14 },
          labels: [{ label: 'Class', value: 'LSIL', style: { color: '#f5222d' } }]
        },
        {
          x: 72020.0 - 256,
          y: 22113.5 - 256,
          width: 512,
          height: 512,
          style: { border: '3px solid #f5222d', fontSize: 14 },
          labels: [{ label: 'Class', value: 'LSIL', style: { color: '#f5222d' } }]
        },
        {
          x: 43047.5 - 256,
          y: 116256.5 - 256,
          width: 512,
          height: 512,
          style: { border: '3px solid #1890ff', fontSize: 14 },
          labels: [{ label: 'Class', value: 'EpitheliumNormal', style: { color: '#1890ff' } }]
        },
        {
          x: 15594.5 - 256,
          y: 59772.0 - 256,
          width: 512,
          height: 512,
          style: { border: '3px solid #1890ff', fontSize: 14 },
          labels: [{ label: 'Class', value: 'EpitheliumNormal', style: { color: '#1890ff' } }]
        }
        // ……其余对象我也可以继续全部转换
      ]

      engine.addOnceHandler('ready', () => {
        engine.loadAIMarks(aiBoxes, false)
      })

      // setTimeout(() => {
      //   engine.destroy()
      // }, 1000)

      let showAIMarksLabel = false
      engine.viewer.addHandler('zoom', (e) => {
        const magnification = engine.magnification?.getMagnification()
        if (magnification <= 10) {
          if (showAIMarksLabel) {
            engine.loadAIMarks(aiBoxes, false)
          }
          showAIMarksLabel = false
        } else {
          if (!showAIMarksLabel) {
            engine.loadAIMarks(aiBoxes, true)
          }
          showAIMarksLabel = true
        }
        console.log('zoom', e, magnification)
      })

      // 3. 定义切换逻辑
      window.useBrowse = () => {
        engine.toolbar?.setActive('browse')
        console.log('切换到浏览模式')
      }

      window.useAnno = () => {
        engine.toolbar?.setActive('anno')
      }
    </script>
  </body>
</html>
